<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Slop - Typing Roguelike</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Top Bar -->
        <div id="top-bar">
            <div class="stat">Wave: <span id="wave">1</span></div>
            <div class="stat">Lives: <span id="lives">3</span></div>
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Combo: <span id="combo">0</span></div>
            <div id="slowmo-bar">
                <div id="slowmo-fill"></div>
                <span id="slowmo-text">SPACE</span>
            </div>
        </div>

        <!-- Game Area -->
        <div id="game-area">
            <div id="enemies-container"></div>
            <div id="player-line"></div>
        </div>

        <!-- Input Area -->
        <div id="input-area">
            <input type="text" id="typing-input" placeholder="Type words here..." autocomplete="off">
        </div>

        <!-- Upgrade Screen -->
        <div id="upgrade-screen" class="hidden">
            <h2>Choose an Upgrade</h2>
            <div id="upgrade-options"></div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="hidden">
            <h2>Game Over</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <p>Waves Survived: <span id="final-wave">0</span></p>
            <button id="restart-btn">Play Again</button>
        </div>

        <!-- Start Screen -->
        <div id="start-screen">
            <h1>Type Slop</h1>
            <p>A fast-paced typing roguelike</p>
            <p>Type words to destroy enemies before they reach you!</p>
            <button id="start-btn">Start Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
